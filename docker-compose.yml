services:
  postgres:
    image: postgres:16-alpine
    container_name: spider-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spider_ai}
      POSTGRES_USER: ${POSTGRES_USER:-spider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spider_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./database/postgres/init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spider} -d ${POSTGRES_DB:-spider_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: spider-ai-backend
    environment:
      APP_NAME: Spider AI
      APP_VERSION: 1.0.0
      ENVIRONMENT: local
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spider}:${POSTGRES_PASSWORD:-spider_password}@postgres:5432/${POSTGRES_DB:-spider_ai}
      SECRET_KEY: ${BACKEND_SECRET_KEY:-replace-with-a-minimum-32-character-secret}
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      RATE_LIMIT_ENABLED: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  frontend:
    build:
      context: ./frontend
    container_name: spider-ai-frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_APP_NAME: Spider AI
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
